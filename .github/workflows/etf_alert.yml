name: Daily KRX ETF Alert

on:
  schedule:
    # 한국 시간 기준 오전 08:15 (UTC 23:15)
    # 서버 지연을 고려하여 15분 일찍 실행되도록 설정
    - cron: '15 23 * * *'
  workflow_dispatch: # 수동으로 즉시 실행하고 싶을 때 사용

jobs:
  run_bot:
    runs-on: ubuntu-latest
    # 저장소에 파일(last_etf_tickers.csv)을 업데이트하기 위해 쓰기 권한이 필요합니다.
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 패키지 캐싱으로 속도 향상

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 파일이 변경되었는지 확인 후 커밋
          if [[ -n "$(git status --porcelain last_etf_tickers.csv)" ]]; then
            git add last_etf_tickers.csv
            git commit -m "chore: update etf list [skip ci]"
            git push
          else
            echo "변경사항이 없어 푸시를 건너뜁니다."
          fi
